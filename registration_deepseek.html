<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Blue & Black</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #0a0e1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: shiftBackground 20s linear infinite;
            pointer-events: none;
        }

        @keyframes shiftBackground {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(50px, 50px);
            }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(0, 102, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
        }

        /* Card */
        .register-card {
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 102, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .register-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0, 102, 255, 0.2), 0 0 0 1px rgba(0, 102, 255, 0.4);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 50px;
            color: #0066ff;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .header h1 {
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #888;
            font-size: 14px;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #0066ff;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #0066ff;
            background: rgba(0, 102, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.3);
        }

        .form-group input::placeholder {
            color: #666;
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: #888;
        }

        /* Terms and conditions */
        .terms {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .terms input {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            transition: all 0.3s ease;
        }

        .terms input:checked + .custom-checkbox {
            background: #0066ff;
            border-color: #0066ff;
        }

        .terms input:checked + .custom-checkbox i {
            display: block;
        }

        .custom-checkbox i {
            font-size: 12px;
            color: #fff;
            display: none;
        }

        .terms label {
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
        }

        .terms a {
            color: #0066ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .terms a:hover {
            color: #3399ff;
            text-decoration: underline;
        }

        /* Register button */
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0066ff 0%, #0044cc 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .register-btn:hover::before {
            left: 100%;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 102, 255, 0.3);
        }

        .register-btn:active {
            transform: translateY(0);
        }

        /* Login link */
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #888;
            font-size: 14px;
        }

        .login-link a {
            color: #0066ff;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #3399ff;
            text-decoration: underline;
        }

        /* Alert messages */
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .alert-success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
        }

        .alert-error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-code"></i>
                </div>
                <h1>Create Account</h1>
                <p>Join our community today</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-text" id="strengthText">Enter a strong password</div>

                <div class="form-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <div class="terms">
                    <input type="checkbox" id="termsCheckbox">
                    <div class="custom-checkbox">
                        <i class="fas fa-check"></i>
                    </div>
                    <label for="termsCheckbox">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">
                    <i class="fas fa-arrow-right" style="margin-right: 8px;"></i>
                    Register Now
                </button>
            </form>

            <div class="login-link">
                Already have an account? <a href="#">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                document.body.appendChild(particle);
            }
        }

        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            switch(strength) {
                case 0:
                case 1:
                    strengthBar.style.width = '20%';
                    strengthBar.style.background = '#ff4444';
                    strengthText.textContent = 'Weak password';
                    strengthText.style.color = '#ff4444';
                    break;
                case 2:
                case 3:
                    strengthBar.style.width = '60%';
                    strengthBar.style.background = '#ffaa00';
                    strengthText.textContent = 'Medium password';
                    strengthText.style.color = '#ffaa00';
                    break;
                case 4:
                case 5:
                    strengthBar.style.width = '100%';
                    strengthBar.style.background = '#00ff00';
                    strengthText.textContent = 'Strong password';
                    strengthText.style.color = '#00ff00';
                    break;
            }
            
            return strength >= 4;
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }

        // Form validation
        function validateForm(username, email, password, confirmPassword, termsChecked) {
            if (!username || username.length < 3) {
                showAlert('Username must be at least 3 characters long', 'error');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Please enter a valid email address', 'error');
                return false;
            }
            
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters long', 'error');
                return false;
            }
            
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return false;
            }
            
            if (!termsChecked) {
                showAlert('Please accept the Terms of Service', 'error');
                return false;
            }
            
            return true;
        }

        // Save to localStorage (simulated registration)
        function saveUser(username, email, password) {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if email already exists
            if (users.some(user => user.email === email)) {
                showAlert('Email already registered. Please use a different email.', 'error');
                return false;
            }
            
            users.push({
                username,
                email,
                password: btoa(password), // Simple encoding (not secure for production)
                registeredAt: new Date().toISOString()
            });
            
            localStorage.setItem('users', JSON.stringify(users));
            return true;
        }

        // Handle form submission
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            if (validateForm(username, email, password, confirmPassword, termsChecked)) {
                if (saveUser(username, email, password)) {
                    showAlert('Registration successful! Redirecting...', 'success');
                    
                    // Clear form
                    document.getElementById('registerForm').reset();
                    document.getElementById('strengthBar').style.width = '0%';
                    
                    // Simulate redirect after 2 seconds
                    setTimeout(() => {
                        showAlert('Welcome to the community!', 'success');
                        // You can redirect to login page here
                        // window.location.href = '/login.html';
                    }, 2000);
                }
            }
        });
        
        // Real-time password strength check
        document.getElementById('password').addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        // Custom checkbox styling
        const termsCheckbox = document.getElementById('termsCheckbox');
        const customCheckbox = document.querySelector('.custom-checkbox');
        termsCheckbox.addEventListener('change', () => {
            if (termsCheckbox.checked) {
                customCheckbox.style.background = '#0066ff';
            } else {
                customCheckbox.style.background = 'rgba(255, 255, 255, 0.05)';
            }
        });
        
        // Initialize particles
        createParticles();
        
        // Smooth input focus effects
        document.querySelectorAll('.form-group input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('i').style.color = '#3399ff';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('i').style.color = '#0066ff';
            });
        });
    </script>
</body>
</html>
